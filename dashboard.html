<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GEO Baseline Dashboard</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #ffffff;
  color: #111;
  margin: 0;
  padding: 24px;
  line-height: 1.4;
  max-width: 1200px;
  margin: 0 auto;
}
.header { border-bottom: 1px solid #e5e5e5; padding-bottom: 20px; margin-bottom: 24px; }
.header h1 { margin: 0 0 4px 0; font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; color: #666; }
.subject { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 12px; font-size: 13px; }
.subject .label { color: #888; margin-right: 6px; }
.subject .value { color: #111; font-weight: 500; }
.scorecard { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.score { border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px; background: #fafafa; }
.score.headline { background: #f1ecff; border-color: #cfc1ff; }
.score .name { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.score.headline .name { color: #4a3b8a; }
.score .pct { font-size: 26px; font-weight: 600; color: #111; }
.score.headline .pct { color: #2d2270; }
.score .pct.empty { color: #bbb; font-weight: 400; font-size: 18px; }
.score .breakdown { font-size: 11px; color: #888; margin-top: 4px; }
.score .source-tag { font-size: 10px; color: #999; text-transform: none; letter-spacing: 0; margin-top: 2px; font-style: italic; }
.section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin: 28px 0 12px 0; }
.matrix { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.matrix th, .matrix td { border: 1px solid #e5e5e5; padding: 6px 8px; text-align: left; vertical-align: top; }
.matrix thead th { background: #f4f4f4; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: #555; }
.matrix .group-row td { background: #fafafa; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #777; font-weight: 600; padding: 5px 8px; }
.matrix .query { color: #111; font-weight: 500; font-size: 12px; }
.matrix .category { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
.matrix col.cat-col { width: 80px; }
.matrix col.q-col { width: 240px; }
.matrix .cell { text-align: center; vertical-align: top; padding: 6px 7px; }
.cell-code { font-weight: 600; font-size: 13px; line-height: 1.2; padding: 2px 0; }
.cell-detail { font-size: 9.5px; color: #777; line-height: 1.35; margin-top: 4px; word-break: break-word; }
.cell-detail.cites { color: #666; }
.cell-detail.comps { color: #b03030; font-weight: 500; }
.cell-detail .label { display: block; text-transform: uppercase; letter-spacing: 0.4px; color: #999; font-size: 8.5px; margin-bottom: 1px; font-weight: 600; }
.cell.mc { background: #d4edda; }
.cell.mc .cell-code { color: #155724; }
.cell.m { background: #fff3cd; }
.cell.m .cell-code { color: #856404; }
.cell.c { background: #cce5ff; }
.cell.c .cell-code { color: #004085; }
.cell.none { background: #ffffff; }
.cell.none .cell-code { color: #ccc; }
.cell.pending { background: #f4f4f4; color: #aaa; font-style: italic; font-weight: 500; text-align: center; }
.cell.error { background: #fce8e8; }
.cell.error .cell-code { color: #b03030; font-style: italic; }
.legend { display: flex; gap: 16px; font-size: 12px; color: #666; margin-top: 12px; flex-wrap: wrap; }
.legend .swatch { display: inline-block; width: 20px; height: 14px; vertical-align: middle; margin-right: 6px; border: 1px solid #ddd; border-radius: 2px; }
.footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e5e5; font-size: 12px; color: #888; }
.footer a { color: #004AAD; }
.error-state { padding: 48px 24px; text-align: center; color: #666; }
.error-state h2 { color: #111; margin-bottom: 12px; }
.error-state code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
.brand-nav { font-size: 13px; color: #666; margin-bottom: 24px; }
.brand-nav a { color: #004AAD; text-decoration: none; margin-right: 12px; }
.brand-nav a.current { font-weight: 600; color: #111; }
.brand-nav a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="brand-nav" id="brand-nav"></div>

<div id="content">
  <div class="error-state" id="loading">Loading…</div>
</div>

<script>
const ENGINES = ["chatgpt", "perplexity", "gemini", "claude"];
const ENGINE_LABELS = { chatgpt: "ChatGPT", perplexity: "Perplexity", gemini: "Gemini", claude: "Claude" };
const ENGINE_TAGS = {
  chatgpt: "API + web search",
  perplexity: "Sonar API",
  gemini: "API + grounding",
  claude: "API + web search"
};

const KNOWN_BRANDS = [
  { slug: "media-copilot", name: "The Media Copilot" },
  { slug: "eight-sleep", name: "Eight Sleep" }
];

function getBrand() {
  const hash = window.location.hash.replace(/^#/, "");
  return hash || "media-copilot";
}

function renderBrandNav(currentSlug) {
  const nav = document.getElementById("brand-nav");
  nav.innerHTML = '<a href="index.html">← All dashboards</a>  ·  ' +
    KNOWN_BRANDS.map(b =>
      `<a href="#${b.slug}" class="${b.slug === currentSlug ? "current" : ""}">${escapeHtml(b.name)}</a>`
    ).join("");
}

async function loadAndRender() {
  const slug = getBrand();
  renderBrandNav(slug);

  let data;
  try {
    const res = await fetch(`data/${slug}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (err) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        <h2>Could not load dashboard</h2>
        <p>No data file found for <code>${escapeHtml(slug)}</code>. Available brands:</p>
        <ul style="list-style:none;padding:0">
          ${KNOWN_BRANDS.map(b => `<li><a href="#${b.slug}">${escapeHtml(b.name)}</a></li>`).join("")}
        </ul>
      </div>`;
    return;
  }

  render(data);
}

// Normalize a cell: data files may store "M" (string) or {code: "M", cited_domains: [], competitors_named: []}
function normalizeCell(cell) {
  if (cell === null || cell === undefined) return null;
  if (typeof cell === "string") return { code: cell, cited: [], comps: [] };
  return {
    code: cell.code,
    cited: cell.cited_domains || cell.cited || [],
    comps: cell.competitors_named || cell.comps || []
  };
}

// Filter Gemini's redirector "google" domain — always present, not informative
function cleanCited(domains, engineId) {
  if (!domains) return [];
  if (engineId === "gemini") return domains.filter(d => d !== "google");
  return domains;
}

function render(data) {
  const queries = data.queries;
  const results = data.results || {};
  const lastRun = data.lastRun || data.date || "—";

  let html = `
  <div class="header">
    <h1>${escapeHtml(data.brand)} — GEO Baseline Dashboard</h1>
    <div class="subtitle">Brand Visibility Score across the major AI answer engines</div>
    <div class="subject">
      <div><span class="label">Brand:</span> <span class="value">${escapeHtml(data.brand)}</span></div>
      <div><span class="label">URL:</span> <span class="value">${escapeHtml(data.url || '')}</span></div>
      ${data.person ? `<div><span class="label">Person:</span> <span class="value">${escapeHtml(data.person)}</span></div>` : ''}
      <div><span class="label">Last run:</span> <span class="value">${escapeHtml(lastRun)}</span></div>
    </div>
  </div>`;

  // Scorecard
  let overallTotal = 0, overallCount = 0;
  let scoreCards = `<div class="score headline">
    <div class="name">Overall Visibility</div>
    <div class="pct" id="score-overall">—</div>
    <div class="breakdown" id="bd-overall">average across engines</div>
  </div>`;

  ENGINES.forEach(eng => {
    const r = results[eng];
    if (!r || Object.keys(r).length === 0) {
      scoreCards += `<div class="score">
        <div class="name">${ENGINE_LABELS[eng]}</div>
        <div class="pct empty">—</div>
        <div class="breakdown">pending</div>
        <div class="source-tag">${ENGINE_TAGS[eng]}</div>
      </div>`;
      return;
    }
    let m = 0, c = 0, presence = 0, valid = 0, errs = 0;
    queries.forEach((_, i) => {
      const cell = normalizeCell(r[i]);
      if (!cell) return;
      const v = cell.code;
      if (v === "ERR") { errs++; return; }
      valid++;
      if (v && v.includes("M")) m++;
      if (v && v.includes("C")) c++;
      if (v === "MC" || v === "M" || v === "C") presence++;
    });
    const denom = valid || 1;
    const pct = Math.round((presence / denom) * 100);
    overallTotal += pct;
    overallCount++;
    scoreCards += `<div class="score">
      <div class="name">${ENGINE_LABELS[eng]}</div>
      <div class="pct">${pct}%</div>
      <div class="breakdown">M: ${m}/${valid} · C: ${c}/${valid}${errs ? " · " + errs + " err" : ""}</div>
      <div class="source-tag">${ENGINE_TAGS[eng]}</div>
    </div>`;
  });

  html += `<div class="section-title">Brand Visibility Score</div>
  <div class="scorecard">${scoreCards}</div>`;

  // Matrix
  html += `<div class="section-title">Query matrix</div>
  <table class="matrix">
    <colgroup>
      <col class="cat-col">
      <col class="q-col">
      <col><col><col><col>
    </colgroup>
    <thead>
      <tr>
        <th>Category</th>
        <th>Query</th>
        ${ENGINES.map(e => `<th class="cell">${ENGINE_LABELS[e]}</th>`).join("")}
      </tr>
    </thead>
    <tbody>`;

  let lastGroup = null;
  queries.forEach((row, i) => {
    if (row.group !== lastGroup) {
      html += `<tr class="group-row"><td colspan="${ENGINES.length + 2}">${escapeHtml(row.group)} queries</td></tr>`;
      lastGroup = row.group;
    }
    html += `<tr>
      <td class="category">${escapeHtml(row.cat)}</td>
      <td class="query">${escapeHtml(row.q)}</td>`;
    ENGINES.forEach(eng => {
      const r = results[eng];
      if (!r || Object.keys(r).length === 0) {
        html += `<td class="cell pending">pending</td>`;
        return;
      }
      const cell = normalizeCell(r[i]);
      if (!cell) {
        html += `<td class="cell none"><div class="cell-code">—</div></td>`;
        return;
      }
      const code = cell.code;
      const cls = code === "ERR" ? "error" : (code && code !== "-" ? code.toLowerCase() : "none");
      const label = code === "ERR" ? "err" : (code || "—");
      const cleanedCites = cleanCited(cell.cited, eng);
      let detail = "";
      if (code !== "MC" && code !== "ERR") {
        const parts = [];
        if (cell.comps && cell.comps.length) {
          parts.push(`<div class="cell-detail comps"><span class="label">competitors</span>${cell.comps.slice(0, 4).map(escapeHtml).join(", ")}</div>`);
        }
        if (cleanedCites && cleanedCites.length) {
          parts.push(`<div class="cell-detail cites"><span class="label">cited</span>${cleanedCites.slice(0, 3).map(escapeHtml).join(", ")}</div>`);
        }
        detail = parts.join("");
      } else if (code === "MC" && cleanedCites && cleanedCites.length) {
        detail = `<div class="cell-detail cites"><span class="label">also cited</span>${cleanedCites.slice(0, 3).map(escapeHtml).join(", ")}</div>`;
      }
      html += `<td class="cell ${cls}"><div class="cell-code">${label}</div>${detail}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;

  html += `<div class="legend">
    <span><span class="swatch" style="background:#d4edda"></span>MC = mentioned and cited</span>
    <span><span class="swatch" style="background:#fff3cd"></span>M = mentioned only</span>
    <span><span class="swatch" style="background:#cce5ff"></span>C = cited only</span>
    <span><span class="swatch" style="background:#ffffff;border-color:#e5e5e5"></span>— = neither</span>
    <span><span class="swatch" style="background:#fce8e8"></span>err = API error</span>
  </div>`;

  html += `<div class="footer">
    Each cell shows the result code plus what's filling the slot when the brand is absent or only mentioned: competitor brands named (in red) and top source domains cited (in grey). Dashboard auto-updates weekly via GitHub Actions. Gemini citations all redirect through Google's grounding URLs, so direct domains are omitted for Gemini.
    <br>By Pete Pachal · <a href="https://mediacopilot.ai">The Media Copilot</a>
  </div>`;

  document.getElementById("content").innerHTML = html;

  if (overallCount > 0) {
    document.getElementById("score-overall").textContent = Math.round(overallTotal / overallCount) + "%";
    document.getElementById("bd-overall").textContent = `average across ${overallCount} engine${overallCount > 1 ? "s" : ""}`;
  }
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

window.addEventListener("hashchange", loadAndRender);
loadAndRender();
</script>
</body>
</html>
